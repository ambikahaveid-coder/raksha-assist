    value: postgresql://doadmin:REDACTED@db-postgresql-blr1-01652-do-user-34285110-0.e.db.ondigitalocean.com:25060/defaultdb?sslmode=require
  github:
    branch: main
    deploy_on_push: true
    repo: jagopro452-cloud/raksha-assist
  health_check:
    http_path: /_health
    initial_delay_seconds: 15
    period_seconds: 10
    timeout_seconds: 5
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
  name: raksha-assist
  run_command: cd backend && node scripts/setup-schema.mjs; npm start
  source_dir: /
