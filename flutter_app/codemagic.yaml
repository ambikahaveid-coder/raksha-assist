workflows:
  android-debug:
    name: Android Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Setup Flutter project
        script: |
          rm -rf android ios
          flutter create --org com.rakshaassist --project-name raksha_assist .
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
