name: raksha_assist
description: Emergency Medical Assistance Platform - Android & iOS App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.2
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  pin_code_fields: ^8.0.1
  razorpay_flutter: ^1.3.6
  shimmer: ^3.0.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  carousel_slider: ^4.2.1
  connectivity_plus: ^5.0.2
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
